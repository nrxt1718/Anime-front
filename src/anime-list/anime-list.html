<div>
  <div class="card">
    <p-carousel [value]="animes()" [numVisible]="3" [numScroll]="3" [circular]="false"
                [responsiveOptions]="responsiveOptions">
      <ng-template let-a #item>
        <div class="border border-surface rounded-border m-2 p-4">
          <div class="mb-4">
            <div class="relative mx-auto">

              <a [routerLink]="['detail', a.mal_id]">
                <img [src]="a.images.jpg.large_image_url" [alt]="a.title" class="w-full rounded-border"/>
              </a>
            </div>
          </div>
          <div class="mb-4 font-medium">{{ a.title }}</div>
          <div class="flex justify-between items-center">
            <span>
            <p-button icon="pi pi-heart" severity="secondary" [outlined]="true"/>
          </span>
          </div>
        </div>
      </ng-template>
    </p-carousel>
  </div>
</div>
