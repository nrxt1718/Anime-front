<div>   <div class="card">
  <p-carousel [value]="animes()" [numVisible]="3" [numScroll]="3" [circular]="false" [responsiveOptions]="responsiveOptions">
    <ng-template let-a #item>
      <div class="border border-surface rounded-border m-2 p-4">
        <div class="mb-4">
          <div class="relative mx-auto">
            <img src="a.urlImage" [alt]="a.titre" class="w-full rounded-border" />
          </div>
        </div>
        <div class="mb-4 font-medium">{{ a.titre }}</div>
        <div class="flex justify-between items-center">
          <div class="mt-0 font-semibold text-xl">{{ '$' + a.here }}</div>
          <span>
            <p-button icon="pi pi-heart" severity="secondary" [outlined]="true" />
          </span>
        </div>
      </div>
    </ng-template>
  </p-carousel>
</div>
